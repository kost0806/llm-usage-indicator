[general]
poll_interval = 60                          # polling interval (seconds)
socket_path   = "/tmp/llm-monitor.sock"
db_path       = "~/.local/share/llm-usage-indicator/data.db"
ccusage_cmd   = "npx ccusage@latest"        # ccusage CLI command

# Monthly credit budgets per provider (USD).
# ccusage detects provider from model name prefix automatically.
[budgets]
claude  = 20.00
gemini  = 15.00
openai  = 10.00
