name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  # Node.js 24 will become the default on 2026-06-16; opt in now to avoid
  # forced migration breaking the pipeline mid-run.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Lint & syntax check ───────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp aiosqlite --quiet

      - name: Syntax check (ast.parse)
        run: |
          python3 - <<'EOF'
          import ast, sys, pathlib
          files = list(pathlib.Path("daemon").rglob("*.py"))
          errors = []
          for f in files:
              try:
                  ast.parse(f.read_text())
                  print(f"OK  {f}")
              except SyntaxError as e:
                  errors.append(f"ERR {f}: {e}")
                  print(f"ERR {f}: {e}", file=sys.stderr)
          if errors:
              sys.exit(1)
          print(f"\nAll {len(files)} files OK.")
          EOF

      - name: Import check
        run: |
          cd $GITHUB_WORKSPACE
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          from daemon.config import load_config
          from daemon.store import Store
          from daemon.providers.base import ProviderStatus, AbstractProvider
          from daemon.providers.ccusage_p import CcusageProvider
          from daemon.server import SocketServer
          print('All imports OK')
          "

      - name: Check shell scripts
        run: |
          bash -n waybar/module.sh && echo "waybar/module.sh OK"
          bash -n install.sh        && echo "install.sh OK"

  # ── 2. Build distributable artifact ──────────────────────────────────────
  build:
    name: Build artifact
    runs-on: ubuntu-22.04
    needs: lint
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Use short commit hash for non-tag builds
            VERSION="0.0.0-dev.$(git rev-parse --short HEAD)"
          fi
          ARTIFACT_NAME="llm-usage-indicator-${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Assemble release directory
        run: |
          ARTIFACT="${{ steps.version.outputs.artifact_name }}"
          mkdir -p "dist/${ARTIFACT}"

          # Core files
          cp -r daemon           "dist/${ARTIFACT}/"
          cp -r waybar           "dist/${ARTIFACT}/"
          cp -r systemd          "dist/${ARTIFACT}/"
          cp -r gui              "dist/${ARTIFACT}/"
          cp    config.example.toml "dist/${ARTIFACT}/"
          cp    requirements.txt    "dist/${ARTIFACT}/"
          cp    install.sh          "dist/${ARTIFACT}/"
          cp    README.md           "dist/${ARTIFACT}/" 2>/dev/null || true
          cp    docs/README.en.md   "dist/${ARTIFACT}/" 2>/dev/null || true

          # Remove Python cache files
          find "dist/${ARTIFACT}" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find "dist/${ARTIFACT}" -name "*.pyc" -delete 2>/dev/null || true

          # Ensure scripts are executable
          chmod +x "dist/${ARTIFACT}/install.sh"
          chmod +x "dist/${ARTIFACT}/waybar/module.sh"

          # Embed version into install.sh
          sed -i "s|^# install.sh.*|# install.sh — llm-usage-indicator v${VERSION}|" \
            "dist/${ARTIFACT}/install.sh" || true

          echo "Contents of dist/${ARTIFACT}:"
          find "dist/${ARTIFACT}" -type f | sort

      - name: Create tarball
        run: |
          ARTIFACT="${{ steps.version.outputs.artifact_name }}"
          cd dist
          tar -czf "${ARTIFACT}.tar.gz" "${ARTIFACT}/"
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
          echo "Tarball size: $(du -sh "${ARTIFACT}.tar.gz" | cut -f1)"

      - name: Create Debian package
        run: |
          ARTIFACT="${{ steps.version.outputs.artifact_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          PKG_DIR="dist/deb/${ARTIFACT}"

          # Package structure
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/lib/llm_usage_indicator"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/share/doc/llm-usage-indicator"
          mkdir -p "${PKG_DIR}/usr/lib/systemd/user"
          mkdir -p "${PKG_DIR}/etc/llm-usage-indicator"

          # Daemon library
          cp -r "dist/${ARTIFACT}/daemon/"* "${PKG_DIR}/usr/lib/llm_usage_indicator/"

          # Wrapper binaries
          cat > "${PKG_DIR}/usr/bin/llm-usage-indicator" << 'WRAP'
          #!/usr/bin/env bash
          PYTHONPATH="/usr/lib" exec python3 -m llm_usage_indicator.main "$@"
          WRAP
          chmod +x "${PKG_DIR}/usr/bin/llm-usage-indicator"

          cp "dist/${ARTIFACT}/gui/settings.py" \
             "${PKG_DIR}/usr/lib/llm_usage_indicator/settings_gui.py"
          cp "dist/${ARTIFACT}/gui/tray.py" \
             "${PKG_DIR}/usr/lib/llm_usage_indicator/tray.py"

          cat > "${PKG_DIR}/usr/bin/llm-usage-indicator-settings" << 'WRAP'
          #!/usr/bin/env bash
          PYTHONPATH="/usr/lib" exec python3 -m llm_usage_indicator.settings_gui "$@"
          WRAP
          chmod +x "${PKG_DIR}/usr/bin/llm-usage-indicator-settings"

          cat > "${PKG_DIR}/usr/bin/llm-usage-indicator-tray" << 'WRAP'
          #!/usr/bin/env bash
          PYTHONPATH="/usr/lib" exec python3 -m llm_usage_indicator.tray "$@"
          WRAP
          chmod +x "${PKG_DIR}/usr/bin/llm-usage-indicator-tray"

          mkdir -p "${PKG_DIR}/usr/share/applications"
          cp "dist/${ARTIFACT}/gui/llm-usage-indicator-settings.desktop" \
             "${PKG_DIR}/usr/share/applications/"

          # Tray autostart desktop file (installed per-user in postinst)
          cp "dist/${ARTIFACT}/gui/llm-usage-indicator-tray.desktop" \
             "${PKG_DIR}/usr/share/llm-usage-indicator/"

          # Systemd user service
          cp "dist/${ARTIFACT}/systemd/llm-usage-indicator.service" \
             "${PKG_DIR}/usr/lib/systemd/user/"

          # Example config
          cp "dist/${ARTIFACT}/config.example.toml" \
             "${PKG_DIR}/etc/llm-usage-indicator/"

          # Waybar script
          mkdir -p "${PKG_DIR}/usr/share/llm-usage-indicator/waybar"
          cp "dist/${ARTIFACT}/waybar/"* \
             "${PKG_DIR}/usr/share/llm-usage-indicator/waybar/"

          # Docs
          cp "dist/${ARTIFACT}/README.md"        "${PKG_DIR}/usr/share/doc/llm-usage-indicator/" 2>/dev/null || true
          cp "dist/${ARTIFACT}/docs/README.en.md" "${PKG_DIR}/usr/share/doc/llm-usage-indicator/" 2>/dev/null || true
          cp "dist/${ARTIFACT}/requirements.txt"  "${PKG_DIR}/usr/share/doc/llm-usage-indicator/"

          # Postinst script
          cat > "${PKG_DIR}/DEBIAN/postinst" << 'POSTINST'
          #!/bin/bash
          set -e

          # Determine the real user: prefer SUDO_USER, fall back to DBUS_SESSION_BUS_ADDRESS owner
          if [ -n "${SUDO_USER:-}" ] && [ "${SUDO_USER}" != "root" ]; then
              REAL_USER="$SUDO_USER"
          elif [ -n "${PKEXEC_UID:-}" ]; then
              REAL_USER=$(getent passwd "$PKEXEC_UID" | cut -d: -f1)
          else
              REAL_USER=$(logname 2>/dev/null || true)
          fi

          if [ -z "$REAL_USER" ] || [ "$REAL_USER" = "root" ]; then
              echo "[llm-usage-indicator] Could not detect install user; run post-setup manually:"
              echo "  llm-usage-indicator-setup"
              exit 0
          fi

          REAL_HOME=$(getent passwd "$REAL_USER" | cut -d: -f6)

          as_user() {
              runuser -u "$REAL_USER" -- env HOME="$REAL_HOME" XDG_RUNTIME_DIR="/run/user/$(id -u "$REAL_USER")" "$@"
          }

          # 1. Create config dir and copy default config if absent
          CONFIG_DIR="$REAL_HOME/.config/llm-usage-indicator"
          CONFIG_FILE="$CONFIG_DIR/config.toml"
          as_user mkdir -p "$CONFIG_DIR"
          as_user chmod 700 "$CONFIG_DIR"
          if [ ! -f "$CONFIG_FILE" ]; then
              as_user cp /etc/llm-usage-indicator/config.example.toml "$CONFIG_FILE"
              as_user chmod 600 "$CONFIG_FILE"
              echo "[llm-usage-indicator] Default config created at $CONFIG_FILE"
              echo "  → Edit monthly budgets: $CONFIG_FILE"
          else
              echo "[llm-usage-indicator] Existing config kept: $CONFIG_FILE"
          fi

          # 2. Install Waybar script
          WAYBAR_DIR="$REAL_HOME/.config/waybar/scripts"
          as_user mkdir -p "$WAYBAR_DIR"
          as_user cp /usr/share/llm-usage-indicator/waybar/module.sh "$WAYBAR_DIR/llm-monitor.sh"
          as_user chmod +x "$WAYBAR_DIR/llm-monitor.sh"
          echo "[llm-usage-indicator] Waybar script installed: $WAYBAR_DIR/llm-monitor.sh"

          # 3. Register desktop entry for the current user
          update-desktop-database /usr/share/applications 2>/dev/null || true

          # 4. Enable and start systemd user service
          SYSTEMD_USER_DIR="$REAL_HOME/.config/systemd/user"
          as_user mkdir -p "$SYSTEMD_USER_DIR"
          as_user cp /usr/lib/systemd/user/llm-usage-indicator.service "$SYSTEMD_USER_DIR/"

          if as_user systemctl --user daemon-reload 2>/dev/null; then
              as_user systemctl --user enable --now llm-usage-indicator 2>/dev/null \
                  && echo "[llm-usage-indicator] Service enabled and started." \
                  || echo "[llm-usage-indicator] WARNING: failed to start service; run: systemctl --user enable --now llm-usage-indicator"
          else
              echo "[llm-usage-indicator] No active user session — service will start at next login."
          fi

          # 5. Register XDG autostart for the tray indicator
          AUTOSTART_DIR="$REAL_HOME/.config/autostart"
          as_user mkdir -p "$AUTOSTART_DIR"
          cp /usr/share/llm-usage-indicator/llm-usage-indicator-tray.desktop \
             "$AUTOSTART_DIR/llm-usage-indicator-tray.desktop"
          chown "$REAL_USER" "$AUTOSTART_DIR/llm-usage-indicator-tray.desktop"
          echo "[llm-usage-indicator] Autostart entry installed (tray starts on next login)."

          # 6. Start tray now if user has an active display session
          USER_DISPLAY=$(as_user bash -c 'echo ${DISPLAY:-${WAYLAND_DISPLAY:-}}' 2>/dev/null || true)
          if [ -n "$USER_DISPLAY" ]; then
              as_user pkill -f "llm_usage_indicator.tray" 2>/dev/null || true
              as_user bash -c 'nohup /usr/bin/llm-usage-indicator-tray >/dev/null 2>&1 &'
              echo "[llm-usage-indicator] Tray indicator started."
          else
              echo "[llm-usage-indicator] No display session — tray will start at next login."
          fi

          echo ""
          echo "[llm-usage-indicator] Installation complete!"
          echo "  Usage is now shown in the top bar (🤖 C:\$xx.xx …)"
          echo "  Open settings: llm-usage-indicator-settings"
          POSTINST
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"

          # Prerm script — stop and disable service before removal
          cat > "${PKG_DIR}/DEBIAN/prerm" << 'PRERM'
          #!/bin/bash
          set -e

          if [ -n "${SUDO_USER:-}" ] && [ "${SUDO_USER}" != "root" ]; then
              REAL_USER="$SUDO_USER"
          elif [ -n "${PKEXEC_UID:-}" ]; then
              REAL_USER=$(getent passwd "$PKEXEC_UID" | cut -d: -f1)
          else
              REAL_USER=$(logname 2>/dev/null || true)
          fi

          if [ -n "$REAL_USER" ] && [ "$REAL_USER" != "root" ]; then
              REAL_HOME=$(getent passwd "$REAL_USER" | cut -d: -f6)
              as_user() {
                  runuser -u "$REAL_USER" -- env HOME="$REAL_HOME" XDG_RUNTIME_DIR="/run/user/$(id -u "$REAL_USER")" "$@"
              }
              as_user systemctl --user disable --now llm-usage-indicator 2>/dev/null || true
              as_user pkill -f "llm_usage_indicator.tray" 2>/dev/null || true
              rm -f "$REAL_HOME/.config/autostart/llm-usage-indicator-tray.desktop"
          fi
          PRERM
          chmod 755 "${PKG_DIR}/DEBIAN/prerm"

          # Calculate installed size (kB)
          INSTALLED_SIZE=$(du -sk "${PKG_DIR}" | cut -f1)

          # Control file
          # Note: version must be a valid Debian version (strip 'dev.' prefix for deb)
          DEB_VERSION=$(echo "$VERSION" | sed 's/-dev\./~dev./g')
          cat > "${PKG_DIR}/DEBIAN/control" << CONTROL
          Package: llm-usage-indicator
          Version: ${DEB_VERSION}
          Section: utils
          Priority: optional
          Architecture: all
          Depends: python3 (>= 3.10), python3-pip, python3-gi, gir1.2-gtk-3.0
          Recommends: gir1.2-appindicator3-0.1, gnome-shell-extension-appindicator, waybar
          Installed-Size: ${INSTALLED_SIZE}
          Maintainer: llm-usage-indicator contributors
          Description: LLM usage indicator for Waybar
           Displays Claude/Gemini/OpenAI usage, daily spend,
           and remaining budget in Waybar status bar on Ubuntu 22.04+.
          CONTROL

          # Build deb
          dpkg-deb --build "${PKG_DIR}" "dist/${ARTIFACT}.deb"
          sha256sum "dist/${ARTIFACT}.deb" > "dist/${ARTIFACT}.deb.sha256"
          echo "Deb package size: $(du -sh "dist/${ARTIFACT}.deb" | cut -f1)"

      - name: Upload artifact (tarball)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}-tarball
          path: |
            dist/${{ steps.version.outputs.artifact_name }}.tar.gz
            dist/${{ steps.version.outputs.artifact_name }}.tar.gz.sha256
          retention-days: 30

      - name: Upload artifact (deb)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}-deb
          path: |
            dist/${{ steps.version.outputs.artifact_name }}.deb
            dist/${{ steps.version.outputs.artifact_name }}.deb.sha256
          retention-days: 30

  # ── 3. Integration smoke test ─────────────────────────────────────────────
  smoke-test:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp aiosqlite --quiet

      - name: Test store CRUD
        run: |
          cd $GITHUB_WORKSPACE
          python3 -c "
          import asyncio, sys
          sys.path.insert(0, '.')
          from daemon.store import Store
          from pathlib import Path

          async def run():
              store = Store(Path('/tmp/ci-test.db'))
              await store.open()
              await store.save_snapshot('claude', 5.0, 0.5)
              snap = await store.get_latest_snapshot('claude')
              assert snap is not None, 'Snapshot not found'
              await store.close()
              print('Store test PASSED')

          asyncio.run(run())
          "

      - name: Test socket server (status command)
        run: |
          cd $GITHUB_WORKSPACE
          python3 -c "
          import asyncio, json, time, sys
          sys.path.insert(0, '.')
          from daemon.store import Store
          from daemon.server import SocketServer
          from daemon.providers.base import ProviderStatus
          from pathlib import Path

          async def run():
              store = Store(Path('/tmp/ci-server.db'))
              await store.open()
              statuses = [
                  ProviderStatus('Claude', 20.0, 7.6, 0.23, time.time()),
                  ProviderStatus('Gemini', 15.0, 6.9, 0.05, time.time()),
                  ProviderStatus('OpenAI', 10.0, 5.8, 1.10, time.time()),
              ]
              async def get_statuses():
                  return statuses
              server = SocketServer('/tmp/ci-test.sock', store, get_statuses)
              await server.start()

              r, w = await asyncio.open_unix_connection('/tmp/ci-test.sock')
              w.write(b'{\"cmd\":\"status\"}\n')
              await w.drain()
              data = json.loads(await r.readline())
              w.close(); await w.wait_closed()
              assert len(data['providers']) == 3
              assert abs(data['total_remaining'] - 24.70) < 0.01
              assert 'last_tps' not in data['providers'][0], 'last_tps should be removed'
              print(f'status: total_remaining=\${data[\"total_remaining\"]:.2f} OK')

              await server.stop()
              await store.close()
              print('Socket server test PASSED')

          asyncio.run(run())
          "

      - name: Test CcusageProvider parsing
        run: |
          cd $GITHUB_WORKSPACE
          python3 -c "
          import sys, time
          sys.path.insert(0, '.')
          from daemon.providers.ccusage_p import CcusageProvider, _model_to_provider
          from daemon.store import Store
          from pathlib import Path
          import asyncio, datetime

          # Unit-test model→provider mapping
          assert _model_to_provider('claude-sonnet-4-6') == 'Claude'
          assert _model_to_provider('gemini-1.5-pro') == 'Gemini'
          assert _model_to_provider('gpt-4o') == 'OpenAI'
          assert _model_to_provider('o3-mini') == 'OpenAI'
          assert _model_to_provider('unknown-model') == 'Other'
          print('Model→provider mapping OK')

          # Unit-test JSON parsing with sample ccusage output
          today = datetime.date.today().isoformat()
          sample = {
              'daily': [
                  {
                      'period': '2026-06-01',
                      'modelBreakdowns': [
                          {'modelName': 'claude-sonnet-4-6', 'cost': 5.0},
                          {'modelName': 'gpt-4o', 'cost': 2.0},
                      ],
                      'totalCost': 7.0,
                  },
                  {
                      'period': today,
                      'modelBreakdowns': [
                          {'modelName': 'claude-opus-4-8', 'cost': 1.5},
                          {'modelName': 'gpt-4o', 'cost': 0.3},
                      ],
                      'totalCost': 1.8,
                  },
              ],
              'totals': {'totalCost': 8.8},
          }

          budgets = {'Claude': 20.0, 'OpenAI': 10.0}

          async def run():
              store = Store(Path('/tmp/ci-ccusage.db'))
              await store.open()
              provider = CcusageProvider(budgets=budgets, store=store)
              statuses = provider._parse_daily_data(sample)

              claude = next(s for s in statuses if s.name == 'Claude')
              openai = next(s for s in statuses if s.name == 'OpenAI')

              assert abs(claude.spent_total - 6.5) < 0.01, f'Expected 6.5 got {claude.spent_total}'
              assert abs(claude.spent_today - 1.5) < 0.01, f'Expected 1.5 got {claude.spent_today}'
              assert claude.budget_usd == 20.0
              assert abs(openai.spent_total - 2.3) < 0.01, f'Expected 2.3 got {openai.spent_total}'
              assert abs(openai.spent_today - 0.3) < 0.01, f'Expected 0.3 got {openai.spent_today}'
              print(f'Claude: total=\${claude.spent_total:.2f} today=\${claude.spent_today:.2f} remaining=\${claude.remaining:.2f}')
              print(f'OpenAI: total=\${openai.spent_total:.2f} today=\${openai.spent_today:.2f} remaining=\${openai.remaining:.2f}')

              await store.close()
              print('CcusageProvider parsing test PASSED')

          asyncio.run(run())
          "

      - name: Test waybar script (no daemon → error JSON)
        run: |
          rm -f /tmp/llm-monitor.sock
          bash waybar/module.sh > /tmp/waybar-out.json
          echo "Output: $(cat /tmp/waybar-out.json)"
          # Read from file directly — avoids bash variable interpolation breaking JSON
          python3 << 'PYEOF'
          import json
          with open('/tmp/waybar-out.json') as f:
              data = json.load(f)
          assert data.get('class') == 'llm-monitor-error', f'Expected error class, got: {data}'
          print('Waybar fallback test PASSED')
          PYEOF

      - name: Test waybar script (with daemon → valid JSON)
        run: |
          # Start a background daemon stub using a temp script file
          cat > /tmp/ci-daemon-stub.py << 'PYDAEMON'
          import asyncio, sys, time
          sys.path.insert(0, '.')
          from daemon.store import Store
          from daemon.server import SocketServer
          from daemon.providers.base import ProviderStatus
          from pathlib import Path

          async def run():
              store = Store(Path('/tmp/ci-waybar.db'))
              await store.open()
              statuses = [ProviderStatus('Claude', 20.0, 7.6, 0.23, time.time())]
              async def get_statuses():
                  return statuses
              server = SocketServer('/tmp/llm-monitor.sock', store, get_statuses)
              await server.start()
              await asyncio.sleep(10)
              await server.stop()
              await store.close()
          asyncio.run(run())
          PYDAEMON

          python3 /tmp/ci-daemon-stub.py &
          BGPID=$!
          sleep 1

          bash waybar/module.sh > /tmp/waybar-live.json
          echo "Output: $(cat /tmp/waybar-live.json)"
          # Read from file directly — tooltip contains real newlines which break
          # bash variable interpolation inside Python string literals
          python3 << 'PYEOF'
          import json
          with open('/tmp/waybar-live.json') as f:
              data = json.load(f)
          assert data.get('class') == 'llm-monitor', f'Expected llm-monitor class, got: {data}'
          assert 'C:' in data.get('text', ''), f'Expected C: in text, got: {data}'
          print('Waybar live test PASSED')
          PYEOF
          wait $BGPID

  # ── 4. GitHub Release (tags only) ─────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-22.04
    needs: [build, smoke-test]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}-tarball
          path: dist/

      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}-deb
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "llm-usage-indicator v${{ needs.build.outputs.version }}"
          body: |
            ## llm-usage-indicator v${{ needs.build.outputs.version }}

            Waybar용 LLM 크레딧 모니터 데몬 (Claude / Gemini / OpenAI)

            ### 설치 방법

            **tarball (범용):**
            ```bash
            tar -xzf llm-usage-indicator-${{ needs.build.outputs.version }}.tar.gz
            cd llm-usage-indicator-${{ needs.build.outputs.version }}
            bash install.sh
            ```

            **Debian/Ubuntu (.deb):**
            ```bash
            sudo dpkg -i llm-usage-indicator-${{ needs.build.outputs.version }}.deb
            pip install aiohttp aiosqlite --user
            ```

            자세한 설치 안내는 [README](https://github.com/${{ github.repository }}/blob/main/README.md)를 참고하세요.

            ### Installation (English)

            See [README.en.md](https://github.com/${{ github.repository }}/blob/main/docs/README.en.md) for English instructions.

            ### Checksums
            Verify downloads with the accompanying `.sha256` files:
            ```bash
            sha256sum -c llm-usage-indicator-${{ needs.build.outputs.version }}.tar.gz.sha256
