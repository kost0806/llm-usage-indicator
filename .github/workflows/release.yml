name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Bump ${{ inputs.bump_type }} & publish release
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Compute next version from latest git tag ─────────────────────────
      - name: Compute next version
        id: ver
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          [[ -z "$LATEST" ]] && LATEST="v0.0.0"

          MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)

          case "${{ inputs.bump_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0        ;;
            patch) PATCH=$((PATCH + 1))                 ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VERSION}"
          echo "${LATEST} → ${TAG}"

          echo "version=${VERSION}"                          >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"                                  >> "$GITHUB_OUTPUT"
          echo "artifact=llm-usage-indicator-${VERSION}"    >> "$GITHUB_OUTPUT"

      # ── Inject version into install scripts ─────────────────────────────
      - name: Stage install scripts with version injected
        run: |
          VER="${{ steps.ver.outputs.version }}"
          mkdir -p dist/staged
          cp install.sh install.ps1 dist/staged/

          python3 - "$VER" << 'PYEOF'
          import sys
          ver = sys.argv[1]

          for path, old, new in [
              ('dist/staged/install.sh',
               '_RELEASE_VERSION=""  # @RELEASE_VERSION@',
               f'_RELEASE_VERSION="{ver}"'),
              ('dist/staged/install.ps1',
               "$_RELEASE_VERSION = ''  # @RELEASE_VERSION@",
               f"$_RELEASE_VERSION = '{ver}'"),
          ]:
              text = open(path).read()
              assert old in text, f"Placeholder not found in {path}"
              open(path, 'w').write(text.replace(old, new, 1))
              print(f"Injected {ver} into {path}")
          PYEOF

      # ── Assemble installation tarball ────────────────────────────────────
      - name: Assemble tarball
        run: |
          ARTIFACT="${{ steps.ver.outputs.artifact }}"
          mkdir -p "dist/${ARTIFACT}"

          cp -r daemon gui systemd waybar "dist/${ARTIFACT}/"
          cp config.example.toml requirements.txt "dist/${ARTIFACT}/"
          cp dist/staged/install.sh dist/staged/install.ps1 "dist/${ARTIFACT}/"

          find "dist/${ARTIFACT}" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find "dist/${ARTIFACT}" -name "*.pyc" -delete 2>/dev/null || true

          chmod +x "dist/${ARTIFACT}/install.sh" \
                   "dist/${ARTIFACT}/waybar/module.sh"

          cd dist
          tar -czf "${ARTIFACT}.tar.gz" "${ARTIFACT}/"
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
          echo "Tarball: $(du -sh "${ARTIFACT}.tar.gz" | cut -f1)"

      # ── Create and push git tag ───────────────────────────────────────────
      - name: Create git tag
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created tag: $TAG"

      # ── Publish GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "llm-usage-indicator ${{ steps.ver.outputs.tag }}"
          body: |
            ## llm-usage-indicator ${{ steps.ver.outputs.tag }}

            ---

            ### 항상 최신 버전 설치

            새 릴리스가 나올 때마다 자동으로 최신 버전을 받습니다.

            **Linux / macOS**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/kost0806/llm-usage-indicator/main/install.sh | bash
            ```

            **Windows (PowerShell — 관리자 권한 불필요)**
            ```powershell
            irm https://raw.githubusercontent.com/kost0806/llm-usage-indicator/main/install.ps1 | iex
            ```

            ---

            ### 이 버전(${{ steps.ver.outputs.tag }})만 설치

            버전을 고정하거나 재현 가능한 배포가 필요할 때 사용합니다.

            **Linux / macOS**
            ```bash
            curl -fsSL https://github.com/kost0806/llm-usage-indicator/releases/download/${{ steps.ver.outputs.tag }}/install.sh | bash
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://github.com/kost0806/llm-usage-indicator/releases/download/${{ steps.ver.outputs.tag }}/install.ps1 | iex
            ```

            **tarball 직접 설치 (Linux / macOS)**
            ```bash
            tar -xzf llm-usage-indicator-${{ steps.ver.outputs.version }}.tar.gz
            cd llm-usage-indicator-${{ steps.ver.outputs.version }}
            bash install.sh
            ```

            **tarball 직접 설치 (Windows)**
            ```powershell
            Expand-Archive llm-usage-indicator-${{ steps.ver.outputs.version }}.zip
            cd llm-usage-indicator-${{ steps.ver.outputs.version }}
            powershell -File install.ps1
            ```

            **체크섬 검증**
            ```bash
            sha256sum -c llm-usage-indicator-${{ steps.ver.outputs.version }}.tar.gz.sha256
            ```
          files: |
            dist/llm-usage-indicator-${{ steps.ver.outputs.version }}.tar.gz
            dist/llm-usage-indicator-${{ steps.ver.outputs.version }}.tar.gz.sha256
            dist/staged/install.sh
            dist/staged/install.ps1
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
