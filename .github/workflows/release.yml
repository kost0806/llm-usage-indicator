name: Release

on:
  push:
    tags: ['v[0-9]*.[0-9]*.[0-9]*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.2.3)'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Resolve version from tag or workflow_dispatch input ──────────────
      - name: Resolve version
        id: ver
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}"     >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"        >> "$GITHUB_OUTPUT"
          echo "artifact=llm-usage-indicator-${VERSION}" >> "$GITHUB_OUTPUT"

      # ── Inject version into install scripts ─────────────────────────────
      - name: Stage install scripts with version injected
        run: |
          VER="${{ steps.ver.outputs.version }}"
          mkdir -p dist/staged
          cp install.sh install.ps1 dist/staged/

          # Replace the @RELEASE_VERSION@ placeholder in both scripts.
          # Using Python avoids shell-escaping issues with $ in the PS1 file.
          python3 - "$VER" << 'PYEOF'
          import sys
          ver = sys.argv[1]

          for path, old, new in [
              ('dist/staged/install.sh',
               '_RELEASE_VERSION=""  # @RELEASE_VERSION@',
               f'_RELEASE_VERSION="{ver}"'),
              ('dist/staged/install.ps1',
               "$_RELEASE_VERSION = ''  # @RELEASE_VERSION@",
               f"$_RELEASE_VERSION = '{ver}'"),
          ]:
              text = open(path).read()
              assert old in text, f"Placeholder not found in {path}"
              open(path, 'w').write(text.replace(old, new, 1))
              print(f"Injected {ver} into {path}")
          PYEOF

      # ── Assemble installation tarball ────────────────────────────────────
      - name: Assemble tarball
        run: |
          ARTIFACT="${{ steps.ver.outputs.artifact }}"
          mkdir -p "dist/${ARTIFACT}"

          cp -r daemon gui systemd waybar "dist/${ARTIFACT}/"
          cp config.example.toml requirements.txt "dist/${ARTIFACT}/"
          cp dist/staged/install.sh dist/staged/install.ps1 "dist/${ARTIFACT}/"

          find "dist/${ARTIFACT}" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find "dist/${ARTIFACT}" -name "*.pyc" -delete 2>/dev/null || true

          chmod +x "dist/${ARTIFACT}/install.sh" \
                   "dist/${ARTIFACT}/waybar/module.sh"

          cd dist
          tar -czf "${ARTIFACT}.tar.gz" "${ARTIFACT}/"
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
          echo "Tarball: $(du -sh "${ARTIFACT}.tar.gz" | cut -f1)"

      # ── Create git tag when triggered via workflow_dispatch ──────────────
      - name: Create git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created tag: $TAG"
          fi

      # ── Publish GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "llm-usage-indicator ${{ steps.ver.outputs.tag }}"
          body: |
            ## llm-usage-indicator ${{ steps.ver.outputs.tag }}

            ### Linux / macOS
            ```bash
            curl -fsSL https://raw.githubusercontent.com/kost0806/llm-usage-indicator/main/install.sh | bash
            ```

            ### Windows (PowerShell — 관리자 권한 불필요)
            ```powershell
            irm https://raw.githubusercontent.com/kost0806/llm-usage-indicator/main/install.ps1 | iex
            ```

            ### 수동 설치 (tarball)
            ```bash
            tar -xzf llm-usage-indicator-${{ steps.ver.outputs.version }}.tar.gz
            cd llm-usage-indicator-${{ steps.ver.outputs.version }}
            bash install.sh           # Linux/macOS
            powershell -File install.ps1  # Windows
            ```
          files: |
            dist/llm-usage-indicator-${{ steps.ver.outputs.version }}.tar.gz
            dist/llm-usage-indicator-${{ steps.ver.outputs.version }}.tar.gz.sha256
            dist/staged/install.sh
            dist/staged/install.ps1
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
